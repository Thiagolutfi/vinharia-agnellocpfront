<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entre em contato com a Vinharia Agnello">
    <meta name="keywords" content="vinhos, contato, vinharia, agnello">
    <title>Contato - Vinharia Agnello</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/efeitos.css">
</head>

<body>
    <p>Página criada por Arthur</p>

    <header>
        <h1>Vinharia Agnello</h1>

        <nav class="menu-contato">          
            <a href="../../index.html">Página inicial</a>
            <a href="produtos.html">Vinhos</a>
            <a href="historia.html">História</a>
            <a href="equipe.html">Equipe</a>        
        </nav>
    </header>

    <main>
 
        <section class="secao-contato caixa-contato">
            <h2 class="titulo-contato">Entre em Contato</h2>
            <p class="texto-contato">Preencha o formulário abaixo para falar com a nossa equipe.</p>

            <form action="#" method="post" class="form-contato">

                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" required class="campo"><br><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" required class="campo"><br><br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="5" required class="campo"></textarea><br><br>

                <button type="submit" class="botao">Enviar</button>

            </form>
        </section>

        <section class="secao-img">
            <h3>Nossa loja</h3>
            <img src="../imgs/colecao_vinhos.jpg" width="500" alt="Loja da Vinharia Agnello" class="img-contato">
        </section>

        <section class="secao-link">
            <p>
                Conheça mais sobre vinhos em 
                <a href="https://pt.wikipedia.org/wiki/Vinho" target="_blank" class="link-contato">
                    este artigo
                </a>.
            </p>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Vinharia Agnello</p>
    </footer>

</body>
</html>
