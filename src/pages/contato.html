<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entre em contato com a Vinharia Agnello">
    <meta name="keywords" content="vinhos, contato, vinharia, agnello">
    <title>Contato - Vinharia Agnello</title>
    <link rel="stylesheet" href="../css/style.css">

</head>

<body>
    <p>Página criada por Arthur</p>

    <header>
        <h1>Vinharia Agnello</h1>

   
        <nav>          
            <a href="../../index.html">Página inicial</a></li>
            <a href="produtos.html">Vinhos</a></li>
            <a href="contato.html">Contato</a></li>
            <a href="equipe.html">Equipe</a></li>         
        </nav>
    </header>

    <main>

        <section>
            <h2>Entre em Contato</h2>
            <p>Preencha o formulário abaixo para falar com a nossa equipe.</p>


            <form action="#" method="post">

                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" required><br><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="5" required></textarea><br><br>

                <button type="submit">Enviar</button>

            </form>
        </section>

        <section>
            <h3>Nossa loja</h3>
            <img src="../imgs/colecao_vinhos.jpg" width="500" alt="Loja da Vinharia Agnello">
        </section>

        <section>
            <p>Conheça mais sobre vinhos em 
                <a href="https://pt.wikipedia.org/wiki/Vinho" target="_blank">este artigo</a>.
            </p>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Vinharia Agnello</p>
    </footer>

</body>
</html>
